services:
  postgres:
    image: postgres:16
    container_name: liveklass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: liveklass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - liveklass_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d liveklass"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  liveklass_postgres_data:
